name: analyze.yml
on:
  push:
    branches:
      - main
jobs:
  build:
    name: Build and analyze
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'corretto'
      - name: Install Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: '3.8.2'
      - name: Build And Analyze
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          SONAR_URL: ${{vars.SONAR_HOST}}
        run: mvn -B -q -DskipTests  verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=cervejaria -Dsonar.projectName='cervejaria'

